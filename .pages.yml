# Configuration du panneau d'administration visuel (Pages CMS — https://pagescms.org)
# Ce fichier décrit, en français, les champs que Kévin voit et modifie dans le panneau.

media:
  input: public/media   # dossier des images dans le dépôt (projets + logos)
  output: /media         # chemin utilisé dans les pages
  extensions: [webp, jpg, jpeg, png, avif, svg]
  categories: [image]

content:
  - name: projets
    label: Projets
    type: collection
    path: src/content/projets
    filename: '{primary}.md'
    view:
      primary: titre
      sort: ordre
      order: asc
      fields: [titre, typologiePrincipale, featured, draft, ordre]
    fields:
      - name: titre
        label: Titre du projet
        type: string
        required: true
      - name: titreEn
        label: Titre (EN) — laisse vide pour réutiliser le titre français
        type: string
      - name: annee
        label: Année (laisser vide si inconnue)
        type: number
      - name: typologiePrincipale
        label: Type de métrage (affiché avant le genre, sur la fiche et les cartes)
        type: select
        required: true
        options:
          values: [Fiction, Clip, Publicité, Brand content, Documentaire, Spot]
      - name: typologies
        label: Catégories (servent aux filtres de la page Projets)
        type: select
        list: true
        options:
          values: [Fiction, Clip, Publicité, Brand content, Documentaire, Spot]
      - name: genres
        label: Genres / styles (saisie libre — ajoute ce que tu veux, un par ligne ; affichés à côté de la date et utilisés pour diversifier la Sélection)
        type: string
        list: true
      - name: genresEn
        label: Genres / styles — version anglaise (saisie libre ; laisse vide = auto-traduction du genre FR)
        type: string
        list: true
      - name: diffusion
        label: Diffusion (ex. « Canal+ », « France 3 Régions · France TV »)
        type: string
      - name: distinctions
        label: Distinctions / sélections (une par ligne)
        type: string
        list: true
      - name: credits
        label: Crédits
        type: object
        fields:
          - { name: realisation, label: Réalisation, type: string }
          - { name: production, label: Production, type: string }
          - { name: image, label: Chef opérateur, type: string }
          - { name: camera, label: Caméra, type: string }
          - { name: etalonnage, label: Étalonnage, type: string, default: 'Kévin Richarte' }
          - { name: workflow, label: Workflow / espace colorimétrique, type: string }
      - name: cover
        label: Image de couverture (vignette + haut de la fiche)
        type: image
      - name: coverAlt
        label: Description de la couverture (pour l'accessibilité)
        type: string
      - name: wipe
        label: Comparatif avant / après (facultatif)
        type: object
        fields:
          - { name: avant, label: Plan REC.709 (avant), type: image }
          - { name: apres, label: Plan étalonné (après), type: image }
          - { name: alt, label: Légende du plan, type: string }
      - name: stills
        label: Galerie de plans — clique « Ajouter un item » autant de fois que tu veux, puis dépose une image dans chaque emplacement (glisse pour réordonner)
        type: object
        list: true
        fields:
          - { name: image, label: Image, type: image }
      - name: inspirations
        label: Inspirations / références (une par ligne)
        type: string
        list: true
      - name: featured
        label: Mettre en avant dans la « Sélection » de l'accueil
        type: boolean
        default: false
      - name: draft
        label: Brouillon — masqué du site tant que la case est cochée
        type: boolean
        default: false
      - name: ordre
        label: Ordre d'affichage (petit nombre = plus haut dans la grille)
        type: number
      - name: afficherNote
        label: Afficher la note d'intention (décoche pour masquer la section sur ce projet)
        type: boolean
        default: true
      - name: body
        label: Note d'intention
        type: rich-text
      - name: noteEn
        label: Note d'intention (EN) — un paragraphe par ligne ; vide = pas de note en anglais
        type: text

  - name: reglages
    label: Réglages du site
    type: file
    path: src/data/reglages.json
    fields:
      - name: afficherFormation
        label: Afficher l'onglet « Formation » dans le menu du site
        type: boolean
      - name: enActive
        label: Activer la version anglaise du site (le sélecteur FR/EN apparaît quand c'est coché)
        type: boolean
        default: false
      - name: respecterFormatVignette
        label: Vignettes — respecter le format d'origine (bandes noires au lieu de recadrer)
        type: boolean
        default: true
      - name: respecterFormatCouverture
        label: Haut de fiche — respecter le format d'origine de l'image de couverture
        type: boolean
        default: true
      - name: respecterFormatWipe
        label: Comparatifs avant/après — respecter le format d'origine
        type: boolean
        default: true
      - name: marquesTexte
        label: Texte au-dessus des logos de marques (laisser vide pour n'afficher que les logos)
        type: text
      - name: marquesTexteEn
        label: Texte des marques (EN) — version anglaise
        type: text
      - name: bioTexte
        label: Bio de la page « À propos » (un paragraphe par ligne, sépare par une ligne vide)
        type: text
      - name: bioTexteEn
        label: Bio (EN) — version anglaise de la bio (un paragraphe par ligne)
        type: text
      - name: categoriesProjets
        label: Catégories de projets (onglets de filtre sur la page Projets)
        description: >-
          Décoche pour masquer un onglet, glisse pour réordonner, ajoute une ligne pour
          une nouvelle catégorie. Un onglet n'apparaît que s'il est coché ET qu'au moins
          un projet publié (non brouillon) l'utilise.
        type: object
        list: true
        fields:
          - name: valeur
            label: Catégorie
            type: select
            options:
              values: [Fiction, Clip, Publicité, Brand content, Documentaire, Spot]
          - { name: label, label: "Nom affiché sur l'onglet (laisser vide = nom par défaut)", type: string }
          - { name: visible, label: Afficher cet onglet, type: boolean, default: true }
      - name: logosDisposition
        label: Disposition des logos
        type: select
        options:
          values:
            - { value: bandeau, label: 'Bandeau défilant (les logos glissent latéralement)' }
            - { value: ligne, label: 'Ligne fixe (les logos restent en place)' }
        default: bandeau
      - name: logosDefilementAuto
        label: Défilement automatique en boucle (décoche pour défiler seulement au survol de la souris)
        type: boolean
        default: true
      - name: logosMelanger
        label: Mélanger l'ordre des logos à chaque visite
        type: boolean
        default: true
      - name: logosVitesse
        label: Vitesse du défilement (secondes par tour — plus grand = plus lent)
        type: number
        default: 40
      - name: logoHauteur
        label: Taille de référence des logos (en pixels — ex. 30)
        type: number
      - name: logos
        label: Logos des marques (glisse pour réordonner ; supprime pour retirer)
        type: object
        list: true
        fields:
          - { name: image, label: Fichier du logo, type: image }
          - { name: nom, label: Nom de la marque, type: string }
          - { name: taille, label: 'Taille propre en % (100 = référence, 120 = plus grand, 80 = plus petit)', type: number, default: 100 }
      - name: seo
        label: SEO & Partage — titres et descriptions par page
        description: >-
          Ce qui s'affiche dans l'onglet du navigateur, sur Google et lors du partage d'un lien
          (le titre en gras + la description dessous). Laisse un champ vide pour garder le texte par défaut.
        type: object
        fields:
          - name: accueil
            label: Accueil
            type: object
            fields:
              - { name: titre, label: 'Titre (FR)', type: string }
              - { name: description, label: 'Description (FR)', type: text }
              - { name: titreEn, label: 'Titre (EN)', type: string }
              - { name: descriptionEn, label: 'Description (EN)', type: text }
          - name: projets
            label: Projets
            type: object
            fields:
              - { name: titre, label: 'Titre (FR)', type: string }
              - { name: description, label: 'Description (FR)', type: text }
              - { name: titreEn, label: 'Titre (EN)', type: string }
              - { name: descriptionEn, label: 'Description (EN)', type: text }
          - name: apropos
            label: À propos
            type: object
            fields:
              - { name: titre, label: 'Titre (FR)', type: string }
              - { name: description, label: 'Description (FR)', type: text }
              - { name: titreEn, label: 'Titre (EN)', type: string }
              - { name: descriptionEn, label: 'Description (EN)', type: text }
          - name: contact
            label: Contact
            type: object
            fields:
              - { name: titre, label: 'Titre (FR)', type: string }
              - { name: description, label: 'Description (FR)', type: text }
              - { name: titreEn, label: 'Titre (EN)', type: string }
              - { name: descriptionEn, label: 'Description (EN)', type: text }
          - name: mentions
            label: Mentions légales
            type: object
            fields:
              - { name: titre, label: 'Titre (FR)', type: string }
              - { name: description, label: 'Description (FR)', type: text }
              - { name: titreEn, label: 'Titre (EN)', type: string }
              - { name: descriptionEn, label: 'Description (EN)', type: text }
