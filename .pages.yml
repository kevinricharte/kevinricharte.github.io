# Configuration du panneau d'administration visuel (Pages CMS — https://pagescms.org)
# Ce fichier décrit, en français, les champs que Kévin voit et modifie dans le panneau.

media:
  input: public/media   # dossier des images dans le dépôt (projets + logos)
  output: /media         # chemin utilisé dans les pages
  extensions: [webp, jpg, jpeg, png, avif, svg]
  categories: [image]

content:
  - name: projets
    label: Projets
    type: collection
    path: src/content/projets
    filename: '{primary}.md'
    view:
      primary: titre
      sort: ordre
      order: asc
      fields: [titre, typologiePrincipale, featured, draft, ordre]
    fields:
      - name: titre
        label: Titre du projet
        type: string
        required: true
      - name: annee
        label: Année (laisser vide si inconnue)
        type: number
      - name: typologiePrincipale
        label: Type affiché sur la fiche
        type: select
        options:
          values: [Fiction, Clip, Publicité, Brand content, Documentaire, Spot]
      - name: typologies
        label: Catégories (servent aux filtres de la page Projets)
        type: select
        list: true
        options:
          values: [Fiction, Clip, Publicité, Brand content, Documentaire, Spot]
      - name: diffusion
        label: Diffusion (ex. « Canal+ », « France 3 Régions · France TV »)
        type: string
      - name: distinctions
        label: Distinctions / sélections (une par ligne)
        type: string
        list: true
      - name: credits
        label: Crédits
        type: object
        fields:
          - { name: realisation, label: Réalisation, type: string }
          - { name: production, label: Production, type: string }
          - { name: image, label: Chef opérateur, type: string }
          - { name: camera, label: Caméra, type: string }
          - { name: etalonnage, label: Étalonnage, type: string, default: 'Kévin Richarte' }
          - { name: workflow, label: Workflow / espace colorimétrique, type: string }
      - name: cover
        label: Image de couverture (vignette + haut de la fiche)
        type: image
      - name: coverAlt
        label: Description de la couverture (pour l'accessibilité)
        type: string
      - name: wipe
        label: Comparatif avant / après (facultatif)
        type: object
        fields:
          - { name: avant, label: Plan REC.709 (avant), type: image }
          - { name: apres, label: Plan étalonné (après), type: image }
          - { name: alt, label: Légende du plan, type: string }
      - name: stills
        label: Galerie de plans (ajoute autant d'images que tu veux)
        type: image
        list: true
      - name: inspirations
        label: Inspirations / références (une par ligne)
        type: string
        list: true
      - name: featured
        label: Mettre en avant dans la « Sélection » de l'accueil
        type: boolean
        default: false
      - name: draft
        label: Brouillon — masqué du site tant que la case est cochée
        type: boolean
        default: false
      - name: ordre
        label: Ordre d'affichage (petit nombre = plus haut dans la grille)
        type: number
      - name: body
        label: Note d'intention
        type: rich-text

  - name: reglages
    label: Réglages du site
    type: file
    path: src/data/reglages.json
    fields:
      - name: afficherFormation
        label: Afficher l'onglet « Formation » dans le menu du site
        type: boolean
      - name: logosDisposition
        label: Disposition des logos
        type: select
        options:
          values:
            - { value: bandeau, label: 'Bandeau défilant (les logos glissent latéralement)' }
            - { value: ligne, label: 'Ligne fixe (les logos restent en place)' }
        default: bandeau
      - name: logosDefilementAuto
        label: Défilement automatique en boucle (décoche pour défiler seulement au survol de la souris)
        type: boolean
        default: true
      - name: logosMelanger
        label: Mélanger l'ordre des logos à chaque visite
        type: boolean
        default: true
      - name: logosVitesse
        label: Vitesse du défilement (secondes par tour — plus grand = plus lent)
        type: number
        default: 40
      - name: logoHauteur
        label: Taille de référence des logos (en pixels — ex. 30)
        type: number
      - name: logos
        label: Logos des marques (glisse pour réordonner ; supprime pour retirer)
        type: object
        list: true
        fields:
          - { name: image, label: Fichier du logo, type: image }
          - { name: nom, label: Nom de la marque, type: string }
          - { name: taille, label: 'Taille propre en % (100 = référence, 120 = plus grand, 80 = plus petit)', type: number, default: 100 }
